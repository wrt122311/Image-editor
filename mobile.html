<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#176f60" />
    <title>手机图片编辑</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        color: #24272b;
        background: #f7f8fa;
        font-family: system-ui, -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        padding: 24px;
      }

      a {
        color: #176f60;
      }
    </style>
    <script>
      const target = new URL("./index.html", location.href);
      target.searchParams.set("mobile", "1");
      target.searchParams.set("standalone", "1");
      target.searchParams.set("v", new URLSearchParams(location.search).get("v") || "20260628-4");
      location.replace(target.href);
    </script>
  </head>
  <body>
    <p>正在打开手机图片编辑器。<a href="./index.html?mobile=1">点击继续</a></p>
  </body>
</html>
